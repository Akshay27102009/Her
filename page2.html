<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen 👑</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ce9ffc 0%, #7367f0 100%);
            font-family: 'Poppins', sans-serif;
            text-align: center;
            color: white;
            padding: 20px;
            overflow-x: hidden;

            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .gallery img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border: 6px solid white;
            border-radius: 20px;
            margin: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
            transition: transform 0.4s ease, box-shadow 0.4s;
        }

        .gallery img:hover {
            transform: scale(1.08) rotate(-1deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .shayari {
            font-size: 1.3rem;
            margin: 20px auto;
            max-width: 600px;
            line-height: 1.6;
            background: rgba(0,0,0,0.2);
            padding: 25px;
            border-radius: 15px;
            position: relative;
            z-index: 10;
            white-space: pre-line;
        }

        .next-btn {
            background: #ff4d6d;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            position: relative;
            z-index: 10;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .next-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.8);
        }

        .heart {
            position: absolute;
            bottom: -50px;
            animation: floatUp 4s infinite linear;
            z-index: 1;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }

        .tulip-pop {
            position: fixed;
            bottom: -50px;
            font-size: 2.5rem;
            animation: popUp 2.5s forwards;
            z-index: 100;
        }

        @keyframes popUp {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-800px) translateX(var(--d)) rotate(25deg); opacity: 0; }
        }
    </style>
</head>

<body>

    <div id="bg-hearts"></div>

    <audio id="loveAudio" loop>
        <source src="music2.mp3" type="audio/mpeg">
    </audio>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
    </div>

    <div class="shayari" id="shayariText"></div>

    <button class="next-btn" onclick="blastTulips()">
        Click to read something special from your Tulip 🌷💌
    </button>

    <script>
        // Background hearts
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '💜';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.getElementById('bg-hearts').appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }, 200);

        // Shayari typing effect
        const text = `Khuda ne jab fursat mai tughe banaya hoga,🎀
Ek surror sa, uske dil pe chaya hoga,😊
Teri ankho👀 mai samandar🌊,
Aadaau mai puri kayinat ke najare bharke🌏,
Sach kehta hu👉🏼👈🏼, tughe dharti pe bhejne se phele,
Khuda ka bhi emann, dagmagaya hoga🤭💗💝🧿✨`;

        let i = 0;
        function typeEffect() {
            if (i < text.length) {
                document.getElementById("shayariText").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeEffect, 40);
            }
        }
        typeEffect();

        // Audio play fix
        document.body.addEventListener("click", () => {
            document.getElementById("loveAudio").play();
        }, { once: true });

        // Tulip blast
        function blastTulips() {
            const emojis = ['💝','🌷'];

            for(let i=0; i<40; i++) {
                setTimeout(() => {
                    const t = document.createElement('div');
                    t.className = 'tulip-pop';
                    t.innerText = emojis[Math.floor(Math.random()*2)];

                    const isLeft = Math.random() > 0.5;
                    t.style.left = isLeft ? (Math.random() * 20) + 'vw' : (Math.random() * 20 + 80) + 'vw';
                    t.style.setProperty('--d', (isLeft ? 150 : -150) + 'px');

                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 2500);
                }, i * 60);
            }

            setTimeout(() => {
                document.body.style.opacity = "0";
                document.body.style.transition = "1s";
            }, 2000);

            setTimeout(() => {
                window.location.href = 'page3.html';
            }, 3000);
        }
    </script>

</body>
</html>
