<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen 👑</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ce9ffc 0%, #7367f0 100%);
            font-family: 'Poppins', sans-serif;
            text-align: center;
            color: white;
            padding: 20px;
            overflow-x: hidden;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .gallery img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border: 6px solid white;
            border-radius: 20px;
            margin: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        .gallery img:hover {
            transform: scale(1.08);
        }

        .shayari {
            font-size: 1.3rem;
            margin: 20px auto;
            max-width: 600px;
            line-height: 1.6;
            background: rgba(0,0,0,0.2);
            padding: 25px;
            border-radius: 15px;
            white-space: pre-line;
        }

        .next-btn {
            background: #ff4d6d;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 1.1rem;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            animation: floatUp 4s infinite linear;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }

        .tulip-pop {
            position: fixed;
            bottom: -50px;
            font-size: 2.5rem;
            animation: popUp 2.5s forwards;
        }

        @keyframes popUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-800px) translateX(var(--d)); opacity: 0; }
        }
    </style>
</head>

<body>

    <div id="bg-hearts"></div>

    <audio id="loveAudio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
    </div>

    <div class="shayari" id="shayariText"></div>

    <button class="next-btn" onclick="blastTulips()">
        Click to read something special 🌷💌
    </button>

    <script>
        // AUTO MUSIC
        window.addEventListener("load", () => {
            if (localStorage.getItem("playMusic") === "true") {
                document.getElementById("loveAudio").play().catch(() => {});
            }
        });

        // Hearts
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '💜';
            h.style.left = Math.random() * 100 + 'vw';
            document.getElementById('bg-hearts').appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }, 200);

        // Shayari typing
        const text = `Khuda ne jab fursat mai tughe banaya hoga,🎀
Ek surror sa, uske dil pe chaya hoga,😊
Teri ankho👀 mai samandar🌊,
Aadaau mai puri kayinat ke najare bharke🌏,
Sach kehta hu👉🏼👈🏼, tughe dharti pe bhejne se phele,
Khuda ka bhi emann, dagmagaya hoga🤭💗💝🧿✨`;

        let i = 0;
        function typeEffect() {
            if (i < text.length) {
                document.getElementById("shayariText").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeEffect, 40);
            }
        }
        typeEffect();

        function blastTulips() {
            for(let i=0; i<40; i++) {
                setTimeout(() => {
                    const t = document.createElement('div');
                    t.className = 'tulip-pop';
                    t.innerText = Math.random() > 0.5 ? '💝' : '🌷';
                    t.style.left = Math.random()*100 + 'vw';
                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 2500);
                }, i * 60);
            }

            setTimeout(() => {
                window.location.href = 'page3.html';
            }, 3000);
        }
    </script>

</body>
</html>
